<div class="parent-container">
    <div class="container-form">
        <h2 class="form-title">DOMU</h2>
        
        <input class="form-input" [(ngModel)]="email" placeholder="Email" />
        <input class="form-input" [(ngModel)]="password" placeholder="Password" type="password" />
        
        <button class="form-button" (click)="login()">Login</button>
        
        <p class="form-link">No account yet ? <a class="form-link-a" routerLink="/register">Register</a></p>
    </div>
</div>
